<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Acervo — MASP</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="css/style.css"
  >

</head>

<body>

  <!-- NAVBAR -->

  <header class="navbar">

    <div class="logo">
      <a href="index.html">MASP</a>
    </div>

    <nav>

      <a href="expo.html">
        Exposições
      </a>

      <a class="active" href="acervo.html">
        Acervo
      </a>

      <a href="sobre.html">
        Sobre
      </a>

    </nav>

  </header>


  <main class="acervo-page">

    <!-- HERO -->

    <section class="acervo-hero reveal">

      <img
        src="assets/acervo.jpg"
        alt="Acervo"
      >

      <div class="acervo-overlay"></div>

      <div class="acervo-title">

        <p class="section-label">
          Coleção
        </p>

        <h1>
          ACERVO
        </h1>

      </div>

    </section>


    <!-- PINTURAS -->

    <button class="expo-toggle">

      <span>PINTURAS</span>

      <span class="toggle-icon">
        +
      </span>

    </button>

    <div class="expo-collapsible">

      <section class="acervo-section">

        <div class="acervo-grid">

          <article class="acervo-item">

            <img
              src="assets/degas.webp"
              alt="Pintura"
            >

            <h3>
              Edgar Degas
            </h3>

          </article>


          <article class="acervo-item">

            <img
              src="assets/tarsila.webp"
              alt="Pintura"
            >

            <h3>
              Tarsila do Amaral
            </h3>

          </article>


          <article class="acervo-item">

            <img
              src="assets/gogh.jpg"
              alt="Pintura"
            >

            <h3>
              Van Gogh
            </h3>

          </article>

        </div>

      </section>

    </div>


    <!-- ESCULTURAS -->

    <button class="expo-toggle">

      <span>ESCULTURAS</span>

      <span class="toggle-icon">
        +
      </span>

    </button>

    <div class="expo-collapsible">

      <section class="acervo-section">

        <div class="acervo-grid">

          <article class="acervo-item">

            <img
              src="assets/amnesia.jpg"
              alt="Escultura"
            >

            <h3>
              Amnésia <br>
              | Flávio Cerqueira
            </h3>

          </article>


          <article class="acervo-item">

            <img
              src="assets/amor.webp"
              alt="Escultura"
            >

            <h3>
              Amor Proibído <br> 
              | Maria Martins
            </h3>

          </article>


          <article class="acervo-item">

            <img
              src="assets/bailarina.jpg"
              alt="Escultura"
            >

            <h3>
              A Bailarina <br>
              | Edgar Degas
            </h3>

          </article>

        </div>

      </section>

    </div>

  </main>


  <!-- FOOTER -->

  <footer class="footer">

    <div>
      MASP
    </div>

    <div>
      São Paulo — Brasil
    </div>

  </footer>

  <script src="js/script.js"></script>

</body>
</html>
